server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Prevent browser caching of all pages
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;

    # Redirect all RDGR dashboard routes to the new subdomain
    location ~ ^/(rdgr|chat|crm|deft|brain|offer-studio|org-chart|our-workflows|social-dashboard|social-voice-settings|scraper-settings|settings-directory|deft-settings|email-voice-settings|settings)(/.*)?$ {
        return 301 https://rdgr.bradfordcarlton.com$request_uri;
    }

    # Dynamic offer pages: /p/<slug> serves /p/index.html
    # /p/thank-you passes through normally (file exists)
    location ~ ^/p/thank-you {
        try_files $uri $uri.html $uri/ =404;
    }
    location ~ ^/p/.+ {
        try_files /p/index.html =404;
    }

    location / {
        try_files $uri $uri.html $uri/ =404;
    }
}
